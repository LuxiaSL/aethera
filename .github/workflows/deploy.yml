name: Deploy to VPS

on:
  push:
    branches: [main]
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

# Required VPS Setup:
# 1. Caddy reverse proxy configured for aetherawi.red
#    (WebSocket support is automatic with Caddy)
# 2. /opt/aethera-server/core/.env file with:
#    - AETHERA_TRIPCODE_SALT=<your-salt>
#    - DREAM_GEN_AUTH_TOKEN=<shared-secret-with-gpu>

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            
            echo "📦 Pulling latest changes..."
            cd /opt/aethera-server/core
            git pull origin main
            
            echo "🔨 Building Docker image..."
            docker build -t aethera:latest .
            
            echo "🔄 Restarting container..."
            # Stop and remove with force flag to handle race conditions
            docker stop aethera 2>/dev/null || true
            sleep 2  # Give container time to fully stop
            docker rm -f aethera 2>/dev/null || true
            docker run -d \
              --name aethera \
              --restart unless-stopped \
              --health-cmd "curl -f http://localhost:2222/healthz || exit 1" \
              --health-interval 30s \
              --health-timeout 10s \
              --health-retries 3 \
              -p 127.0.0.1:2222:2222 \
              --env-file /opt/aethera-server/core/.env \
              -v /opt/aethera-server/core/data:/app/data \
              aethera:latest
            
            echo "⏳ Waiting for container to be healthy..."
            sleep 5
            for i in {1..12}; do
              if curl -sf http://localhost:2222/healthz > /dev/null 2>&1; then
                echo "✅ Health check passed!"
                break
              fi
              echo "   Waiting... ($i/12)"
              sleep 5
            done
            
            echo "🧹 Cleaning up old images..."
            docker image prune -f
            
            echo "✅ Deploy complete!"
            docker ps | grep aethera
            
            echo ""
            echo "🌙 Dreams module ready at /dreams"
            echo "   Make sure .env has DREAM_GEN_AUTH_TOKEN"


